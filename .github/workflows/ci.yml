name: Identity Service CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  verify-build-publish:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Verify with Maven
        run: mvn -B -ntp clean verify

      - name: Validate generated reports
        shell: bash
        run: |
          test -f target/site/jacoco/index.html
          test -f target/site/jacoco/jacoco.xml
          test -f target/openapi-docs/index.html

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Build Docker image
        run: docker compose build app

      - name: Generate Maven site
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: mvn -B -ntp site

      - name: Assemble GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        shell: bash
        run: |
          rm -rf pages
          mkdir -p pages/openapi pages/maven-site pages/coverage
          cp -R docs/. pages/
          cp -R target/openapi-docs/. pages/openapi/
          rm -rf pages/openapi/.openapi-generator pages/openapi/.openapi-generator-ignore
          cp -R target/site/. pages/maven-site/
          cp -R target/site/jacoco/. pages/coverage/
          test -f pages/index.html
          test -f pages/openapi/index.html
          test -f pages/coverage/index.html
          test -f pages/maven-site/index.html
          test -f pages/maven-site/jacoco/index.html

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: verify-build-publish

    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
