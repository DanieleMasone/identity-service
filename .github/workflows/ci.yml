name: Identity Service CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  verify-build-publish:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build & Test
        run: mvn -B -ntp clean verify

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Build Docker image
        run: docker compose build app

      - name: Generate Documentation Site
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: mvn -B -ntp site

      - name: Assemble GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        shell: bash
        run: |
          rm -rf pages
          mkdir -p pages/maven-site pages/coverage
          cp -R docs/. pages/
          cp -R target/site/. pages/maven-site/
          cp -R target/site/jacoco/. pages/coverage/

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: verify-build-publish

    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
